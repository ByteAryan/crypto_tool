<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Crypto Tool with Full Simulations</title>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
               font-family: 'Segoe UI', sans-serif; min-height: 100vh; padding: 20px; color: white; }
        .container { max-width: 1400px; margin: 0 auto; }
        .title { text-align: center; font-size: 2.5em; margin-bottom: 30px; }
        .input-section { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); 
                        border-radius: 20px; padding: 30px; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .input-group textarea { width: 100%; padding: 15px; border: none; border-radius: 10px; 
                               background: rgba(255,255,255,0.1); color: white; }
        .btn { padding: 15px 30px; border: none; border-radius: 25px; font-size: 16px; 
               cursor: pointer; margin: 5px; background: linear-gradient(45deg, #ff6b6b, #4ecdc4); 
               color: white; transition: transform 0.3s; }
        .btn:hover { transform: translateY(-2px); }
        .crypto-ops { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
                     gap: 20px; margin-top: 30px; }
        .crypto-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); 
                      border-radius: 20px; padding: 25px; }
        .result { margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.2); 
                 border-radius: 10px; font-family: monospace; font-size: 12px; 
                 word-break: break-all; min-height: 100px; }
        
        .simulation-panel { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
                           border-radius: 20px; padding: 30px; margin-bottom: 30px; display: none; }
        .simulation-panel.active { display: block; }
        .sim-step { background: rgba(255,255,255,0.08); border-radius: 15px; 
                   padding: 20px; margin-bottom: 15px; border-left: 4px solid #4ecdc4;
                   transition: all 0.3s ease; }
        .sim-step:hover { background: rgba(255,255,255,0.12); transform: translateX(5px); }
        .sim-step-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .sim-step-number { background: linear-gradient(45deg, #4ecdc4, #44a08d);
                          color: white; border-radius: 50%; width: 35px; height: 35px;
                          display: flex; align-items: center; justify-content: center;
                          font-weight: bold; font-size: 16px; }
        .sim-step-name { font-size: 18px; font-weight: 600; flex-grow: 1; margin-left: 15px; }
        .sim-step-desc { color: rgba(255,255,255,0.8); margin-bottom: 15px; font-size: 14px; }
        .sim-data { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 15px;
                   font-family: 'Courier New', monospace; font-size: 12px; }
        .sim-data-item { margin-bottom: 8px; }
        .sim-data-label { color: #4ecdc4; font-weight: 600; }
        .sim-data-value { color: #fff; word-break: break-all; }
        .simulation-controls { text-align: center; margin-top: 20px; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.2);
                       border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #4ecdc4, #44a08d);
                        transition: width 0.3s ease; }
        .simulation-title { text-align: center; margin-bottom: 20px; font-size: 1.8em; }
        .download-btn { padding: 10px 20px; background: linear-gradient(45deg, #4ecdc4, #44a08d);
                        border: none; border-radius: 15px; color: white; cursor: pointer;
                        font-size: 14px; margin-top: 10px; display: inline-block; width: 48%;
                        text-align: center; transition: transform 0.3s; margin-left: 1%; margin-right: 1%; }
        .download-btn:hover { transform: scale(1.05); }
        .download-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Animation Modal Styles */
        .animation-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                          background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
                          display: flex; align-items: center; justify-content: center;
                          z-index: 10000; animation: fadeIn 0.3s ease; }
        .animation-container { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                              border-radius: 20px; padding: 40px; max-width: 800px; width: 90%;
                              max-height: 90vh; overflow-y: auto; position: relative;
                              box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .animation-canvas { width: 100%; height: 400px; background: rgba(0,0,0,0.2);
                           border-radius: 15px; margin: 20px 0; display: block; }
        .animation-description { text-align: center; font-size: 16px; line-height: 1.6;
                                color: rgba(255,255,255,0.9); margin-top: 20px; }
        .close-btn { position: absolute; top: 20px; right: 30px; font-size: 40px;
                    color: white; cursor: pointer; background: none; border: none;
                    line-height: 1; transition: transform 0.3s; }
        .close-btn:hover { transform: rotate(90deg); }
        .info-btn { background: linear-gradient(45deg, #667eea, #764ba2);
                   border: none; color: white; width: 30px; height: 30px;
                   border-radius: 50%; cursor: pointer; font-size: 16px;
                   display: flex; align-items: center; justify-content: center;
                   transition: all 0.3s; margin-left: auto; }
        .info-btn:hover { transform: scale(1.1); box-shadow: 0 5px 15px rgba(102,126,234,0.5); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; }
                            to { transform: translateX(0); opacity: 1; } }
        @keyframes float { 0%, 100% { transform: translateY(0); }
                          50% { transform: translateY(-10px); } }
        .particle { position: absolute; width: 4px; height: 4px; background: #4ecdc4;
                   border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🔐 Crypto Tool with All Simulations</h1>
        
        <div class="input-section">
            <div style="display: flex; gap: 10px; margin-bottom: 20px; align-items: center;">
                <label style="margin: 0;">
                    <input type="radio" name="inputMode" value="text" checked onchange="toggleInputMode()"> Text Input
                </label>
                <label style="margin: 0;">
                    <input type="radio" name="inputMode" value="file" onchange="toggleInputMode()"> File Upload
                </label>
            </div>
            
            <div class="input-group" id="textInputGroup">
                <label for="plaintext">Text Input:</label>
                <textarea id="plaintext" rows="4" placeholder="Enter message...">The quick brown fox jumps over the lazy dog</textarea>
            </div>
            
            <div class="input-group" id="fileInputGroup" style="display: none;">
                <label for="fileInput">Choose File:</label>
                <input type="file" id="fileInput" onchange="handleFileSelect()" 
                       style="width: 100%; padding: 15px; border: 2px dashed rgba(255,255,255,0.3); 
                              border-radius: 10px; background: rgba(255,255,255,0.05); color: white; cursor: pointer;">
                <div id="fileInfo" style="margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.2); 
                                          border-radius: 5px; display: none;">
                    <div><strong>File:</strong> <span id="fileName"></span></div>
                    <div><strong>Size:</strong> <span id="fileSize"></span></div>
                    <div><strong>Type:</strong> <span id="fileType"></span></div>
                </div>
            </div>
            
            <div class="input-group">
                <label for="algorithmSelect">Select Algorithm:</label>
                <select id="algorithmSelect" style="width: 100%; padding: 15px; border: none; border-radius: 10px; 
                                                      background: rgba(255,255,255,0.1); color: white; font-size: 16px;">
                    <option value="aes">🔒 AES-GCM (Symmetric)</option>
                    <option value="des">🔐 DES (Symmetric)</option>
                    <option value="3des">🔏 3DES (Symmetric)</option>
                    <option value="blowfish">🐡 Blowfish (Symmetric)</option>
                    <option value="chacha20">🎲 ChaCha20 (Symmetric)</option>
                    <option value="rsa">🗝️ RSA-OAEP (Asymmetric)</option>
                    <option value="ecc">🔑 ECC (Asymmetric)</option>
                    <option value="playfair">📝 Playfair (Classical)</option>
                    <option value="hill">⛰️ Hill Cipher (Classical)</option>
                    <option value="vigenere">🔤 Vigenère (Classical)</option>
                    <option value="railfence">🚂 Rail Fence (Classical)</option>
                    <option value="columnar">📊 Columnar (Classical)</option>
                </select>
            </div>
            
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn" onclick="runEncryptWithSimulation()">🔬 Encrypt & Simulate</button>
            </div>
        </div>
        
        <!-- Decryption Section -->
        <div class="input-section">
            <h2 style="text-align: center; margin-bottom: 20px;">🔓 Decryption</h2>
            
            <div class="input-group">
                <label for="decryptAlgorithmSelect">Select Decryption Algorithm:</label>
                <select id="decryptAlgorithmSelect" style="width: 100%; padding: 15px; border: none; border-radius: 10px; 
                                                             background: rgba(255,255,255,0.1); color: white; font-size: 16px;">
                    <option value="aes">🔒 AES-GCM</option>
                    <option value="des">🔐 DES</option>
                    <option value="3des">🔏 3DES</option>
                    <option value="blowfish">🐡 Blowfish</option>
                    <option value="chacha20">🎲 ChaCha20</option>
                    <option value="rsa">🗝️ RSA-OAEP</option>
                    <option value="ecc">🔑 ECC</option>
                    <option value="playfair">📝 Playfair</option>
                    <option value="hill">⛰️ Hill Cipher</option>
                    <option value="vigenere">🔤 Vigenère</option>
                    <option value="railfence">🚂 Rail Fence</option>
                    <option value="columnar">📊 Columnar</option>
                </select>
            </div>
            
            <div class="input-group">
                <label for="encryptedFileInput">Upload Encrypted File (.enc or .key):</label>
                <input type="file" id="encryptedFileInput" onchange="handleEncryptedFileSelect()" 
                       accept=".enc,.key,application/octet-stream"
                       style="width: 100%; padding: 15px; border: 2px dashed rgba(255,255,255,0.3); 
                              border-radius: 10px; background: rgba(255,255,255,0.05); color: white; cursor: pointer;">
                <div id="encryptedFileInfo" style="margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.2); 
                                          border-radius: 5px; display: none;">
                    <div><strong>File:</strong> <span id="encryptedFileName"></span></div>
                    <div><strong>Size:</strong> <span id="encryptedFileSize"></span></div>
                    <div><strong>Algorithm:</strong> <span id="encryptedAlgorithm"></span></div>
                </div>
            </div>
            
            <div style="text-align: center;">
                <button class="btn" onclick="decryptData()">🔓 Decrypt</button>
            </div>
            
            <div style="margin-top: 20px;">
                <h3>Decryption Result:</h3>
                <div class="result" id="decryption-result">Upload an encrypted file and click Decrypt</div>
                <button class="download-btn" id="decrypt-download" onclick="downloadDecrypted()" disabled style="width: 100%; margin-top: 10px;">📥 Download Decrypted File</button>
            </div>
        </div>
        
        <div class="simulation-panel" id="simulationPanel">
            <h2 class="simulation-title" id="simulationTitle">🔬 Simulation</h2>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div id="simulationSteps"></div>
            <div class="simulation-controls">
                <button class="btn" onclick="closeSimulation()">Close Simulation</button>
            </div>
        </div>
        
        <div class="input-section">
            <h2 style="text-align: center; margin-bottom: 20px;" id="resultTitle">📊 Results</h2>
            <div class="crypto-card" style="width: 100%;">
                <h3 id="result-algorithm-name">Select an algorithm and encrypt</h3>
                <div class="result" id="crypto-result">Results will appear here after encryption</div>
                <button class="download-btn" id="result-download" onclick="downloadResult()" disabled style="width: 48%;">📄 Download Report</button>
                <button class="download-btn" id="result-download-binary" onclick="downloadBinary()" disabled style="width: 48%;">📦 Download Encrypted File</button>
            </div>
        </div>
    </div>

    <script>
        let selectedFile = null;
        let selectedEncryptedFile = null;
        let decryptedData = null;
        let currentResult = null;  // Store current encryption result
        let currentAlgorithm = null;  // Store current algorithm
        let currentInputData = null;  // Store current input data for binary downloads
        let currentSimulation = null;  // Store current simulation data
        let currentSimulationTitle = null;

        // Utility function to sanitize filenames for cross-platform compatibility
        function sanitizeFilename(filename) {
            if (!filename) return 'file';
            
            // Remove any path separators (both Windows and Unix)
            // HTML5 File API should already provide basename, but handle edge cases
            let sanitized = filename.replace(/^.*[\\\/]/, '');
            
            // Remove or replace invalid characters
            sanitized = sanitized.replace(/[<>:"|?*\x00-\x1f]/g, '_');
            
            // Limit length
            if (sanitized.length > 200) {
                const lastDot = sanitized.lastIndexOf('.');
                if (lastDot > 0) {
                    const ext = sanitized.substring(lastDot);
                    const name = sanitized.substring(0, 200 - ext.length);
                    sanitized = name + ext;
                } else {
                    sanitized = sanitized.substring(0, 200);
                }
            }
            
            return sanitized || 'file';
        }

        function toggleInputMode() {
            const mode = document.querySelector('input[name="inputMode"]:checked').value;
            document.getElementById('textInputGroup').style.display = mode === 'text' ? 'block' : 'none';
            document.getElementById('fileInputGroup').style.display = mode === 'file' ? 'block' : 'none';
            if (mode === 'text') selectedFile = null;
        }
        
        const algorithmTitles = {
            'aes': '🔒 AES-GCM',
            'des': '🔐 DES',
            '3des': '🔏 3DES',
            'blowfish': '🐡 Blowfish',
            'chacha20': '🎲 ChaCha20',
            'rsa': '🗝️ RSA-OAEP',
            'ecc': '🔑 ECC',
            'playfair': '📝 Playfair',
            'hill': '⛰️ Hill Cipher',
            'vigenere': '🔤 Vigenère',
            'railfence': '🚂 Rail Fence',
            'columnar': '📊 Columnar'
        };

        function handleFileSelect() {
            const file = document.getElementById('fileInput').files[0];
            if (file) {
                selectedFile = file;
                const safeName = sanitizeFilename(file.name);
                document.getElementById('fileName').textContent = safeName;
                document.getElementById('fileSize').textContent = formatFileSize(file.size);
                document.getElementById('fileType').textContent = file.type || 'unknown';
                document.getElementById('fileInfo').style.display = 'block';
            } else {
                selectedFile = null;
                document.getElementById('fileInfo').style.display = 'none';
            }
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' bytes';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }
        
        function handleEncryptedFileSelect() {
            const file = document.getElementById('encryptedFileInput').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const content = e.target.result;
                        const encryptedData = JSON.parse(content);
                        
                        selectedEncryptedFile = {
                            file: file,
                            data: encryptedData
                        };
                        
                        const safeName = sanitizeFilename(file.name);
                        document.getElementById('encryptedFileName').textContent = safeName;
                        document.getElementById('encryptedFileSize').textContent = formatFileSize(file.size);
                        document.getElementById('encryptedAlgorithm').textContent = encryptedData.algorithm || 'Unknown';
                        document.getElementById('encryptedFileInfo').style.display = 'block';
                        
                        // Auto-select the correct decryption algorithm based on file metadata
                        if (encryptedData.algorithm) {
                            const algo = encryptedData.algorithm.toLowerCase();
                            const select = document.getElementById('decryptAlgorithmSelect');
                            
                            // Map algorithm names to dropdown values
                            if (algo.includes('aes')) select.value = 'aes';
                            else if (algo.includes('des') && algo.includes('3')) select.value = '3des';
                            else if (algo.includes('des')) select.value = 'des';
                            else if (algo.includes('blowfish')) select.value = 'blowfish';
                            else if (algo.includes('chacha20')) select.value = 'chacha20';
                            else if (algo.includes('rsa')) select.value = 'rsa';
                            else if (algo.includes('ecc')) select.value = 'ecc';
                            else if (algo.includes('playfair')) select.value = 'playfair';
                            else if (algo.includes('hill')) select.value = 'hill';
                            else if (algo.includes('vigenere') || algo.includes('vigenère')) select.value = 'vigenere';
                            else if (algo.includes('railfence') || algo.includes('rail')) select.value = 'railfence';
                            else if (algo.includes('columnar')) select.value = 'columnar';
                        }
                    } catch (error) {
                        alert('Error reading encrypted file: ' + error.message);
                        selectedEncryptedFile = null;
                        document.getElementById('encryptedFileInfo').style.display = 'none';
                    }
                };
                reader.onerror = () => {
                    alert('Failed to read encrypted file');
                    selectedEncryptedFile = null;
                    document.getElementById('encryptedFileInfo').style.display = 'none';
                };
                reader.readAsText(file);
            } else {
                selectedEncryptedFile = null;
                document.getElementById('encryptedFileInfo').style.display = 'none';
            }
        }
        
        async function decryptData() {
            try {
                if (!selectedEncryptedFile) {
                    alert('Please select an encrypted file first');
                    return;
                }
                
                const algorithm = document.getElementById('decryptAlgorithmSelect').value;
                const encryptedFile = JSON.stringify(selectedEncryptedFile.data);
                
                let endpoint = `decrypt-${algorithm}`;
                
                const result = await callAPI(endpoint, { encryptedFile: encryptedFile });
                
                if (result.success) {
                    decryptedData = result;
                    
                    let displayText = result.plaintext;
                    if (!result.isText) {
                        displayText = displayText.substring(0, 200) + '... (binary data)';
                    } else if (displayText.length > 500) {
                        displayText = displayText.substring(0, 500) + '...';
                    }
                    
                    document.getElementById('decryption-result').innerHTML = 
                        `✓ Decrypted Successfully<br>` +
                        `Original Name: ${result.originalName}<br>` +
                        `Size: ${result.size} bytes<br>` +
                        `Decryption Time: ${result.decryptTime}ms<br>` +
                        `Type: ${result.isText ? 'Text' : 'Binary'}<br><br>` +
                        `<details open><summary>Decrypted Content</summary>` +
                        `<div style="max-height:200px;overflow-y:auto;font-size:12px;word-break:break-all;white-space:pre-wrap;">${displayText}</div></details>`;
                    
                    document.getElementById('decrypt-download').disabled = false;
                } else {
                    document.getElementById('decryption-result').innerHTML = `❌ Decryption Failed<br>Error: ${result.error}`;
                    document.getElementById('decrypt-download').disabled = true;
                    decryptedData = null;
                }
            } catch (error) {
                alert('Error during decryption: ' + error.message);
                document.getElementById('decryption-result').innerHTML = `❌ Error: ${error.message}`;
                document.getElementById('decrypt-download').disabled = true;
                decryptedData = null;
            }
        }
        
        async function downloadDecrypted() {
            if (!decryptedData) {
                alert('No decrypted data to download');
                return;
            }
            
            try {
                const response = await fetch('/api/download-decrypted', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(decryptedData)
                });
                
                if (!response.ok) {
                    throw new Error('Failed to download decrypted file');
                }
                
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                const originalName = decryptedData.originalName || 'file.txt';
                a.download = sanitizeFilename('decrypted_' + originalName);
                document.body.appendChild(a);
                a.click();
                
                // Cleanup with slight delay to ensure download starts (Windows compatibility)
                setTimeout(() => {
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                }, 100);
            } catch (error) {
                alert('Error downloading decrypted file: ' + error.message);
            }
        }

        async function callAPI(endpoint, data) {
            try {
                const response = await fetch(`/api/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (error) {
                return { success: false, error: error.message };
            }
        }

        async function getInputData() {
            const mode = document.querySelector('input[name="inputMode"]:checked').value;
            
            if (mode === 'file') {
                if (!selectedFile) throw new Error('Please select a file');
                
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const arrayBuffer = e.target.result;
                            const bytes = new Uint8Array(arrayBuffer);
                            
                            // Convert Uint8Array to base64 in chunks to avoid call stack issues on Windows
                            let binary = '';
                            const chunkSize = 8192; // Process 8KB at a time
                            for (let i = 0; i < bytes.length; i += chunkSize) {
                                const chunk = bytes.subarray(i, Math.min(i + chunkSize, bytes.length));
                                binary += String.fromCharCode.apply(null, chunk);
                            }
                            const base64 = btoa(binary);
                            
                            resolve({
                                data: base64,
                                name: sanitizeFilename(selectedFile.name),
                                size: selectedFile.size,
                                type: 'file',
                                mimeType: selectedFile.type
                            });
                        } catch (error) {
                            reject(new Error('Failed to process file: ' + error.message));
                        }
                    };
                    reader.onerror = () => reject(new Error('Failed to read file'));
                    reader.readAsArrayBuffer(selectedFile);
                });
            } else {
                const text = document.getElementById('plaintext').value;
                if (!text.trim()) throw new Error('Please enter some text');
                return {
                    data: text,
                    name: 'text_input.txt',
                    size: new Blob([text]).size,
                    type: 'text'
                };
            }
        }

        async function runEncryptWithSimulation() {
            try {
                const algorithm = document.getElementById('algorithmSelect').value;
                const inputData = await getInputData();
                currentInputData = inputData;
                currentAlgorithm = algorithm;
                
                const simResult = await callAPI(`${algorithm}-simulate`, inputData);
                
                if (simResult.success) {
                    const title = `🔬 ${algorithmTitles[algorithm]} Encryption Simulation`;
                    displaySimulation(title, simResult);
                    
                    const encResult = await callAPI(algorithm, inputData);
                    
                    if (encResult.success) {
                        currentResult = encResult;
                        document.getElementById('result-algorithm-name').textContent = algorithmTitles[algorithm];
                        
                        let resultHTML = `✓ Encrypted<br>File: ${encResult.originalName}<br>Size: ${encResult.originalSize} → ${encResult.encryptedSize} bytes<br>`;
                        
                        // Add algorithm-specific details
                        if (encResult.iv) {
                            resultHTML += `IV: ${encResult.iv.substring(0, 24)}...<br>`;
                        }
                        if (encResult.nonce) {
                            resultHTML += `Nonce: ${encResult.nonce.substring(0, 24)}...<br>`;
                        }
                        if (encResult.tag) {
                            resultHTML += `Tag: ${encResult.tag.substring(0, 24)}...<br>`;
                        }
                        if (encResult.encryptTime) {
                            resultHTML += `Time: ${encResult.encryptTime}ms<br>`;
                        }
                        if (encResult.keygenTime) {
                            resultHTML += `Keygen: ${encResult.keygenTime}ms<br>`;
                        }
                        if (encResult.key) {
                            resultHTML += `Key: ${encResult.key.substring(0, 24)}...<br>`;
                        }
                        
                        resultHTML += `<details><summary>Encrypted Data</summary><div style="max-height:100px;overflow-y:auto;font-size:10px;word-break:break-all;">${encResult.encrypted}</div></details>`;
                        
                        document.getElementById('crypto-result').innerHTML = resultHTML;
                        document.getElementById('result-download').disabled = false;
                        document.getElementById('result-download-binary').disabled = false;
                    }
                } else {

                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        function displaySimulation(title, simulation) {

        function downloadResult() {
            if (!currentResult || !currentAlgorithm) {
                alert('No result to download');
                return;
            }

            let content = '';
            const timestamp = new Date().toLocaleString();
            const result = currentResult;
            const algoTitle = algorithmTitles[currentAlgorithm];

            content = `${algoTitle} Encryption Result\n`;
            content += '='.repeat(algoTitle.length + 18) + '\n';
            content += `Generated: ${timestamp}\n`;
            content += `Original File: ${result.originalName}\n`;
            content += `Original Size: ${result.originalSize} bytes\n`;
            content += `Encrypted Size: ${result.encryptedSize} bytes\n`;
            
            if (result.encryptTime) content += `Encryption Time: ${result.encryptTime}ms\n`;
            if (result.keygenTime) content += `Key Generation Time: ${result.keygenTime}ms\n`;
            
            content += '\n';
            
            if (result.iv) content += `IV (Initialization Vector):\n${result.iv}\n\n`;
            if (result.nonce) content += `Nonce:\n${result.nonce}\n\n`;
            if (result.tag) content += `Authentication Tag:\n${result.tag}\n\n`;
            if (result.key) content += `Key:\n${result.key}\n\n`;
            
            content += `Encrypted Data:\n${result.encrypted}\n`;

            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(content));
            element.setAttribute('download', `${currentAlgorithm}_result_${Date.now()}.txt`);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }
        
        async function downloadBinary() {
            try {
                if (!currentInputData || !currentAlgorithm) {
                    alert('No data available. Please run encryption first.');
                    return;
                }
                
                let endpoint = `download-${currentAlgorithm}-binary`;
                
                // Make API call
                const response = await fetch(`/api/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(currentInputData)
                });
                
                if (!response.ok) {
                    throw new Error('Failed to download encrypted file');
                }
                
                // Get the blob from response
                const blob = await response.blob();
                
                // Extract filename from Content-Disposition header or use default
                const contentDisposition = response.headers.get('Content-Disposition');
                let filename = `encrypted_${currentAlgorithm}_${Date.now()}.enc`;
                
                if (contentDisposition) {
                    const filenameMatch = contentDisposition.match(/filename="?(.+)"?/i);
                    if (filenameMatch && filenameMatch[1]) {
                        filename = sanitizeFilename(filenameMatch[1]);
                    }
                }
                
                // Create download link
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                
                // Clean up with slight delay to ensure download starts (Windows compatibility)
                setTimeout(() => {
                    window.URL.revokeObjectURL(url);
                    document.body.removeChild(a);
                }, 100);
                
            } catch (error) {
                alert('Error downloading binary file: ' + error.message);
                console.error('Download error:', error);
            }
        }

        function animateStep(title, stepNumber, stepName, stepData, canvas) {
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            const desc = document.getElementById('animDesc');
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Determine animation based on algorithm type
            if (title.includes('AES') || title.includes('DES') || title.includes('Blowfish') || title.includes('ChaCha20')) {
                animateAESStep(stepNumber, stepName, stepData, ctx, canvas, desc);
            } else if (title.includes('RSA')) {
                animateRSAStep(stepNumber, stepName, stepData, ctx, canvas, desc);
            } else if (title.includes('ECC') && !title.includes('ECDH')) {
                // ECC (ECIES) encryption has different steps than RSA
                animateECCStep(stepNumber, stepName, stepData, ctx, canvas, desc);
            } else if (title.includes('ECDH')) {
                animateECDHStep(stepNumber, stepName, stepData, ctx, canvas, desc);
            } else if (title.includes('Playfair')) {
                animatePlayfairStep(stepNumber, stepName, stepData, ctx, canvas, desc);
            } else if (title.includes('Hill')) {
                animateHillStep(stepNumber, stepName, stepData, ctx, canvas, desc);
            } else if (title.includes('Vigenère')) {
                animateVigenereStep(stepNumber, stepName, stepData, ctx, canvas, desc);
            } else if (title.includes('Rail Fence')) {
                animateRailFenceStep(stepNumber, stepName, stepData, ctx, canvas, desc);
            } else if (title.includes('Columnar')) {
                animateColumnarStep(stepNumber, stepName, stepData, ctx, canvas, desc);
            } else if (title.includes('Hash')) {
                animateHashStep(stepNumber, stepName, stepData, ctx, canvas, desc);
            }
        }

        // Specific Animation Implementations
        function animateTextToHex(stepData, ctx, canvas, desc) {
            desc.textContent = "Your input data is converted to bytes and then to hexadecimal representation.";
            let frame = 0;
            
            // Get actual plaintext from hex
            let displayText = "";
            let hexBytes = [];
            
            if (stepData.plaintext_hex) {
                const hexStr = stepData.plaintext_hex;
                // Convert hex to text (first 40 chars for display)
                try {
                    for (let i = 0; i < Math.min(hexStr.length, 40); i += 2) {
                        const byte = parseInt(hexStr.substr(i, 2), 16);
                        hexBytes.push(hexStr.substr(i, 2).toUpperCase());
                        if (byte >= 32 && byte <= 126) {  // Printable ASCII
                            displayText += String.fromCharCode(byte);
                        } else {
                            displayText += '.';
                        }
                    }
                } catch (e) {
                    displayText = "[Binary Data]";
                }
            }
            
            displayText = displayText.substring(0, 20) || "DATA";
            const textChars = displayText.split('');
            
            const animate = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Title
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 18px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Your Input Data', canvas.width / 2, 30);
                ctx.font = '12px monospace';
                ctx.fillText(`Length: ${stepData.plaintext_length} bytes`, canvas.width / 2, 50);
                
                const charsToShow = Math.min(textChars.length, 10);
                const startX = (canvas.width - charsToShow * 65) / 2;
                
                for (let i = 0; i < charsToShow; i++) {
                    const x = startX + i * 65;
                    const y = 120;
                    const progress = Math.max(0, Math.min(1, (frame - i * 5) / 40));
                    
                    // Draw character
                    ctx.globalAlpha = 1;
                    ctx.fillStyle = '#667eea';
                    ctx.fillRect(x, y, 50, 50);
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x, y, 50, 50);
                    
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 24px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(textChars[i], x + 25, y + 33);
                    
                    // Draw arrow
                    if (progress > 0.3) {
                        ctx.strokeStyle = '#4ecdc4';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(x + 25, y + 50);
                        ctx.lineTo(x + 25, y + 80);
                        ctx.stroke();
                        // Arrow head
                        ctx.beginPath();
                        ctx.moveTo(x + 20, y + 75);
                        ctx.lineTo(x + 25, y + 80);
                        ctx.lineTo(x + 30, y + 75);
                        ctx.stroke();
                    }
                    
                    // Draw hex
                    if (progress > 0.6 && hexBytes[i]) {
                        ctx.fillStyle = '#44a08d';
                        ctx.fillRect(x, y + 90, 50, 50);
                        ctx.strokeStyle = '#ffffff';
                        ctx.strokeRect(x, y + 90, 50, 50);
                        
                        ctx.fillStyle = '#ffffff';
                        ctx.font = 'bold 16px monospace';
                        ctx.fillText('0x' + hexBytes[i], x + 25, y + 120);
                    }
                }
                
                // Show sample hex output at bottom
                if (frame > 50 && stepData.plaintext_preview) {
                    ctx.globalAlpha = 1;
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillRect(20, canvas.height - 80, canvas.width - 40, 60);
                    ctx.strokeStyle = '#4ecdc4';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(20, canvas.height - 80, canvas.width - 40, 60);
                    
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '10px monospace';
                    ctx.textAlign = 'left';
                    ctx.fillText('Hex Output: ' + stepData.plaintext_preview, 30, canvas.height - 50);
                    ctx.textAlign = 'center';
                }
                
                ctx.textAlign = 'left';
                ctx.globalAlpha = 1;
                frame++;
                if (frame < 150) requestAnimationFrame(animate);
            };
            animate();
        }
        
        function animateKeyGeneration(stepData, ctx, canvas, desc) {
            desc.textContent = "Your cryptographic keys are generated using a secure random number generator.";
            let frame = 0;
            const keyBits = stepData.key_bits || 256;
            const ivBits = stepData.iv_bits || 96;
            const keyHex = stepData.key_hex || '';
            const ivHex = stepData.iv_hex || '';
            
            const particles = [];
            
            for (let i = 0; i < 100; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: -50,
                    speed: 2 + Math.random() * 3,
                    size: 2 + Math.random() * 3,
                    hue: Math.random() * 60 + 160
                });
            }
            
            const animate = () => {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Title
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 18px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Generating Your Keys', canvas.width / 2, 30);
                
                particles.forEach((p, i) => {
                    p.y += p.speed;
                    if (p.y > canvas.height + 50) {
                        p.y = -50;
                        p.x = Math.random() * canvas.width;
                    }
                    
                    ctx.fillStyle = `hsl(${p.hue}, 80%, 60%)`;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    
                    // Draw actual random hex digits from keys
                    if (frame % 5 === 0 && keyHex) {
                        const hexIndex = Math.floor(Math.random() * keyHex.length);
                        ctx.fillStyle = '#ffffff';
                        ctx.font = '12px monospace';
                        ctx.fillText(keyHex[hexIndex], p.x, p.y);
                    }
                });
                
                // Draw key boxes
                const progress = Math.min(1, frame / 100);
                
                // Key box
                ctx.fillStyle = 'rgba(68, 160, 141, 0.3)';
                ctx.fillRect(50, canvas.height - 150, canvas.width - 100, 60);
                ctx.strokeStyle = '#44a08d';
                ctx.lineWidth = 3;
                ctx.strokeRect(50, canvas.height - 150, canvas.width - 100, 60);
                
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`🔑 Encryption Key (${keyBits}-bit)`, canvas.width / 2, canvas.height - 130);
                
                if (progress > 0.3 && keyHex) {
                    ctx.font = '10px monospace';
                    const keyDisplay = keyHex.substring(0, 48) + '...';
                    ctx.fillText(keyDisplay, canvas.width / 2, canvas.height - 110);
                }
                
                // IV box
                ctx.fillStyle = 'rgba(78, 205, 196, 0.3)';
                ctx.fillRect(50, canvas.height - 80, canvas.width - 100, 60);
                ctx.strokeStyle = '#4ecdc4';
                ctx.lineWidth = 3;
                ctx.strokeRect(50, canvas.height - 80, canvas.width - 100, 60);
                
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 14px sans-serif';
                ctx.fillText(`🎲 Initialization Vector (${ivBits}-bit)`, canvas.width / 2, canvas.height - 60);
                
                if (progress > 0.5 && ivHex) {
                    ctx.font = '10px monospace';
                    const ivDisplay = ivHex.substring(0, 32) + '...';
                    ctx.fillText(ivDisplay, canvas.width / 2, canvas.height - 40);
                }
                
                ctx.textAlign = 'left';
                frame++;
                if (frame < 200) requestAnimationFrame(animate);
            };
            animate();
        }
        
        function animateBlockDivision(stepData, ctx, canvas, desc) {
            desc.textContent = "Your data is divided into fixed-size blocks for encryption.";
            let frame = 0;
            const blockCount = Math.min(8, parseInt(stepData.total_blocks) || 5);
            const blockSize = stepData.block_size || 16;
            const plaintextHex = stepData.plaintext_hex || '';
            const blockWidth = Math.min(100, (canvas.width - 100) / blockCount);
            const blockHeight = 60;
            
            // Extract actual data blocks 
            const dataBlocks = [];
            for (let i = 0; i < blockCount; i++) {
                const start = i * blockSize * 2; // 2 hex chars per byte
                const blockHex = plaintextHex.substring(start, start + blockSize * 2);
                dataBlocks.push(blockHex);
            }
            
            const animate = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Title
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 18px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`Dividing Your Data into ${blockCount} Blocks`, canvas.width / 2, 30);
                ctx.font = '12px sans-serif';
                ctx.fillText(`Block size: ${blockSize} bytes each`, canvas.width / 2, 50);
                
                const progress = Math.min(1, frame / 80);
                const startX = canvas.width / 2 - (blockCount * blockWidth) / 2;
                const splitProgress = Math.min(1, Math.max(0, (frame - 20) / 60));
                
                if (progress < 0.3) {
                    // Show original data block
                    ctx.fillStyle = '#667eea';
                    ctx.fillRect(startX, 100, blockCount * blockWidth, blockHeight);
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(startX, 100, blockCount * blockWidth, blockHeight);
                    
                    ctx.fillStyle = '#ffffff';
                    ctx.font = '10px monospace';
                    ctx.textAlign = 'center';
                    const dataPreview = plaintextHex.substring(0, 32) + '...';
                    ctx.fillText(dataPreview, startX + (blockCount * blockWidth) / 2, 135);
                } else {
                    // Draw divided blocks
                    for (let i = 0; i < blockCount; i++) {
                        const offsetY = splitProgress * 120;
                        const offsetX = (i - (blockCount - 1) / 2) * splitProgress * 20;
                        
                        ctx.fillStyle = `hsl(${230 + i * 20}, 70%, 60%)`;
                        ctx.fillRect(startX + i * blockWidth + offsetX, 100 + offsetY, blockWidth - 4, blockHeight);
                        ctx.strokeStyle = '#ffffff';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(startX + i * blockWidth + offsetX, 100 + offsetY, blockWidth - 4, blockHeight);
                        
                        ctx.fillStyle = '#ffffff';
                        ctx.font = 'bold 12px sans-serif';
                        ctx.textAlign = 'center';

        // Rail Fence Pattern Visualization
        function animateRailPattern(stepData, ctx, canvas, desc, stepNumber) {
            desc.textContent = `Rail Fence cipher writes text in a zigzag pattern across rails.`;
            let frame = 0;
            
            const animate = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 18px sans-serif';

                const startX = (canvas.width - text.length * charWidth) / 2;
                const startY = 80;
                
                const progress = Math.min(text.length, Math.floor(frame / 6));
                
                for (let i = 0; i < progress; i++) {
                    // Calculate rail position (zigzag)
                    const cycle = 2 * (rails - 1);
                    const position = i % cycle;
                    const rail = position < rails ? position : cycle - position;
                    
                    const x = startX + i * charWidth;
                    const y = startY + rail * railHeight;
                    
                    // Draw rail line
                    if (i < progress - 1) {
                        const nextCycle = (i + 1) % cycle;
                        const nextRail = nextCycle < rails ? nextCycle : cycle - nextCycle;
                        const nextY = startY + nextRail * railHeight;
                        
                        ctx.strokeStyle = '#4ecdc4';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(x + charWidth / 2, y);
                        ctx.lineTo(x + charWidth + charWidth / 2, nextY);

                    // Draw character

                    ctx.arc(x + charWidth / 2, y, 20, 0, Math.PI * 2);

                    y: -Math.random() * 200,

                // Draw funnel

                ctx.beginPath();
                ctx.moveTo(canvas.width / 2 - 150, 70);
                ctx.lineTo(canvas.width / 2 - 30, canvas.height - 80);

                    // Funnel effect
                    const funnelTop = 70;
                    const funnelBottom = canvas.height - 80;

                        const relativeY = (p.y - funnelTop) / (funnelBottom - funnelTop);

                        const funnelCenter = canvas.width / 2;

                        if (Math.abs(p.x - funnelCenter) > maxDist) {

        function animateCompression(stepData, ctx, canvas, desc, stepNumber) {
            desc.textContent = "Data is compressed through multiple rounds of mixing and transformation.";
            let frame = 0;
            const blocksProcessed = stepData.blocks_processed || stepNumber - 1;
            const blockSize = stepData.block_size_bytes || 64;
            
            const animate = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                const blocks = 8;
                const blockWidth = 60;
                const blockHeight = 50;
                const startY = 100;
                const spacing = (canvas.width - blocks * blockWidth) / (blocks + 1);
                
                for (let i = 0; i < blocks; i++) {
                    const x = spacing + i * (blockWidth + spacing);
                    const wave = Math.sin(frame * 0.1 + i * 0.5) * 10;
                    const y = startY + wave;
                    
                    // Color shifts
                    const hue = (180 + frame * 2 + i * 30) % 360;
                    ctx.fillStyle = `hsl(${hue}, 70%, 60%)`;
                    ctx.fillRect(x, y, blockWidth, blockHeight);
                    ctx.strokeStyle = '#ffffff';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(x, y, blockWidth, blockHeight);
                    
                    // Mixing arrows
                    if (i < blocks - 1 && frame % 20 < 10) {
                        ctx.strokeStyle = '#ffff00';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.moveTo(x + blockWidth, y + blockHeight / 2);
                        ctx.lineTo(x + blockWidth + spacing, y + blockHeight / 2);
                        ctx.stroke();
                        
                        // Arrow head
                        ctx.beginPath();
                        ctx.moveTo(x + blockWidth + spacing - 10, y + blockHeight / 2 - 5);
                        ctx.lineTo(x + blockWidth + spacing, y + blockHeight / 2);
                        ctx.lineTo(x + blockWidth + spacing - 10, y + blockHeight / 2 + 5);
                        ctx.stroke();
                    }
                }
                
                // Compressed output
                const outputY = 280;
                const outputWidth = 200;
                const compressProgress = Math.min(1, frame / 100);
                
                ctx.fillStyle = '#44a08d';
                ctx.fillRect(canvas.width / 2 - outputWidth / 2, outputY, outputWidth * compressProgress, 60);
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.strokeRect(canvas.width / 2 - outputWidth / 2, outputY, outputWidth, 60);
                
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 16px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`Round ${blocksProcessed}`, canvas.width / 2, 50);
                ctx.font = '12px sans-serif';
                ctx.fillText(`Block size: ${blockSize} bytes`, canvas.width / 2, 70);
                ctx.fillText('Compressed', canvas.width / 2, outputY + 38);
                ctx.textAlign = 'left';
                
                frame++;
                if (frame < 150) requestAnimationFrame(animate);
            };
            animate();
        }
        
        function animateAvalanche(stepData, ctx, canvas, desc) {
            desc.textContent = "Changing just one bit in the input causes approximately half the output bits to flip (avalanche effect).";
            let frame = 0;
            const changedBits = stepData.bits_changed || 'many';
            
            const animate = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                const gridSize = 16;
                const cellSize = 20;
                const startX = canvas.width / 2 - (gridSize * cellSize) / 2;
                const startY = 100;
                
                // Draw bit grid
                for (let i = 0; i < gridSize; i++) {
                    for (let j = 0; j < gridSize; j++) {
                        const x = startX + i * cellSize;
                        const y = startY + j * cellSize;
                        
                        // Distance from center
                        const centerI = gridSize / 2;
                        const centerJ = gridSize / 2;
                        const dist = Math.sqrt((i - centerI) ** 2 + (j - centerJ) ** 2);
                        
                        // Propagation effect
                        const threshold = frame * 0.15;
                        const shouldFlip = dist < threshold;
                        
                        ctx.fillStyle = shouldFlip ? (Math.random() > 0.5 ? '#ff6b6b' : '#4ecdc4') : '#667eea';
                        ctx.fillRect(x, y, cellSize - 2, cellSize - 2);
                    }
                }
                
                // Highlight: center bit change
                if (frame < 30) {
                    ctx.strokeStyle = '#ffff00';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(startX + (gridSize / 2) * cellSize - 2, 
                                  startY + (gridSize / 2) * cellSize - 2, 
                                  cellSize + 2, cellSize + 2);
                }
                
                // Ripple effect
                if (frame < 60) {
                    const rippleRadius = frame * 8;
                    ctx.strokeStyle = `rgba(255, 255, 255, ${1 - frame / 60})`;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(canvas.width / 2, startY + (gridSize * cellSize) / 2, rippleRadius, 0, Math.PI * 2);
                    ctx.stroke();
                }
                
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 16px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('1 Bit Changed → Cascading Changes', canvas.width / 2, 60);
                ctx.font = '12px sans-serif';
                ctx.fillText(`Approximately ${changedBits} bits affected`, canvas.width / 2, canvas.height - 20);
                ctx.textAlign = 'left';
                
                frame++;
                if (frame < 120) requestAnimationFrame(animate);
            };
            animate();
        }
        
        function animateCrystallization(stepData, ctx, canvas, desc) {
            desc.textContent = "Your final hash value solidifies into a fixed-size output.";
            let frame = 0;
            const hashLength = stepData.hash_length || 32;
            const hashBits = hashLength * 8;
            const hashValue = stepData.hash_value || stepData.sha256_hash || '';
            
            // Get actual input data to show transformation
            let inputPreview = 'Your Data';
            if (currentSimulation && currentSimulation.steps[0]) {
                const inputHex = currentSimulation.steps[0].data.plaintext_hex || currentSimulation.steps[0].data.input_hex || '';
                inputPreview = inputHex.substring(0, 20) + '...';
            }
            
            const animate = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const progress = Math.min(1, frame / 100);
                
                // Title
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 18px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('Generating Your Hash', canvas.width / 2, 30);
                
                // Show input data flowing
                if (frame < 60) {
                    ctx.font = '10px monospace';
                    ctx.fillText(`Input: ${inputPreview}`, canvas.width / 2, 60);
                }
                
                // Flowing data particles at top
                for (let i = 0; i < 20; i++) {
                    const x = (i * 40 + frame * 3) % canvas.width;
                    const y = 80 + Math.sin(frame * 0.1 + i) * 10;
                    
                    ctx.fillStyle = `hsl(${(frame + i * 20) % 360}, 70%, 60%)`;
                    ctx.beginPath();
                    ctx.arc(x, y, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Crystallization center
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2 + 20;
                const crystals = 8;
                
                for (let i = 0; i < crystals; i++) {
                    const angle = (Math.PI * 2 / crystals) * i;
                    const length = progress * 80;
                    const x1 = centerX + Math.cos(angle) * 20;
                    const y1 = centerY + Math.sin(angle) * 20;
                    const x2 = centerX + Math.cos(angle) * length;
                    const y2 = centerY + Math.sin(angle) * length;
                    
                    ctx.strokeStyle = '#4ecdc4';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);
                    ctx.stroke();
                    
                    // Crystal tips
                    ctx.fillStyle = '#44a08d';
                    ctx.beginPath();
                    ctx.arc(x2, y2, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Center hexagon
                ctx.fillStyle = '#667eea';
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = (Math.PI / 3) * i;
                    const x = centerX + Math.cos(angle) * 25 * progress;
                    const y = centerY + Math.sin(angle) * 25 * progress;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                if (progress > 0.7) {
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 14px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText(`${hashBits}-bit`, centerX, centerY + 5);
                }
                
                // Show actual hash value at bottom
                if (progress > 0.8 && hashValue) {
                    ctx.fillStyle = 'rgba(0,0,0,0.3)';
                    ctx.fillRect(50, canvas.height - 90, canvas.width - 100, 70);
                    ctx.strokeStyle = '#44a08d';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(50, canvas.height - 90, canvas.width - 100, 70);
                    
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 14px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText('💎 Your Final Hash:', canvas.width / 2, canvas.height - 65);
                    ctx.font = '9px monospace';
                    // Split hash into two lines for better display
                    const line1 = hashValue.substring(0, 32);
                    const line2 = hashValue.substring(32, 64);
                    ctx.fillText(line1, canvas.width / 2, canvas.height - 45);
                    if (line2) ctx.fillText(line2, canvas.width / 2, canvas.height - 30);
                }
                ctx.textAlign = 'left';
                
                frame++;
                if (frame < 150) requestAnimationFrame(animate);
            };
            animate();
        }
        
        function animateGeneric(stepData, ctx, canvas, desc, stepName) {
            desc.textContent = `Processing: ${stepName}`;
            let frame = 0;
            
            const animate = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Generic processing animation
                const bars = 8;
                for (let i = 0; i < bars; i++) {
                    const x = (canvas.width / bars) * i + 20;
                    const height = Math.abs(Math.sin(frame * 0.05 + i * 0.5)) * 200 + 50;
                    const y = canvas.height / 2 - height / 2;
                    
                    ctx.fillStyle = `hsl(${(frame * 2 + i * 40) % 360}, 70%, 60%)`;
                    ctx.fillRect(x, y, canvas.width / bars - 40, height);
                }
                
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 20px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('⚙️ Processing...', canvas.width / 2, 50);
                ctx.textAlign = 'left';
                
                frame++;
                if (frame < 150) requestAnimationFrame(animate);
            };
            animate();
        }
    </script>

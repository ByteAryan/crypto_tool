<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Crypto Tool with Full Simulations</title>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
               font-family: 'Segoe UI', sans-serif; min-height: 100vh; padding: 20px; color: white; }
        .container { max-width: 1400px; margin: 0 auto; }
        .title { text-align: center; font-size: 2.5em; margin-bottom: 30px; }
        .input-section { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); 
                        border-radius: 20px; padding: 30px; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; }
        .input-group textarea { width: 100%; padding: 15px; border: none; border-radius: 10px; 
                               background: rgba(255,255,255,0.1); color: white; }
        .btn { padding: 15px 30px; border: none; border-radius: 25px; font-size: 16px; 
               cursor: pointer; margin: 5px; background: linear-gradient(45deg, #ff6b6b, #4ecdc4); 
               color: white; transition: transform 0.3s; }
        .btn:hover { transform: translateY(-2px); }
        .crypto-ops { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
                     gap: 20px; margin-top: 30px; }
        .crypto-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); 
                      border-radius: 20px; padding: 25px; }
        .result { margin-top: 15px; padding: 15px; background: rgba(0,0,0,0.2); 
                 border-radius: 10px; font-family: monospace; font-size: 12px; 
                 word-break: break-all; min-height: 100px; }
        
        .simulation-panel { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px);
                           border-radius: 20px; padding: 30px; margin-bottom: 30px; display: none; }
        .simulation-panel.active { display: block; }
        .sim-step { background: rgba(255,255,255,0.08); border-radius: 15px; 
                   padding: 20px; margin-bottom: 15px; border-left: 4px solid #4ecdc4;
                   transition: all 0.3s ease; }
        .sim-step:hover { background: rgba(255,255,255,0.12); transform: translateX(5px); }
        .sim-step-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .sim-step-number { background: linear-gradient(45deg, #4ecdc4, #44a08d);
                          color: white; border-radius: 50%; width: 35px; height: 35px;
                          display: flex; align-items: center; justify-content: center;
                          font-weight: bold; font-size: 16px; }
        .sim-step-name { font-size: 18px; font-weight: 600; flex-grow: 1; margin-left: 15px; }
        .sim-step-desc { color: rgba(255,255,255,0.8); margin-bottom: 15px; font-size: 14px; }
        .sim-data { background: rgba(0,0,0,0.3); border-radius: 10px; padding: 15px;
                   font-family: 'Courier New', monospace; font-size: 12px; }
        .sim-data-item { margin-bottom: 8px; }
        .sim-data-label { color: #4ecdc4; font-weight: 600; }
        .sim-data-value { color: #fff; word-break: break-all; }
        .simulation-controls { text-align: center; margin-top: 20px; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.2);
                       border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #4ecdc4, #44a08d);
                        transition: width 0.3s ease; }
        .simulation-title { text-align: center; margin-bottom: 20px; font-size: 1.8em; }
        .download-btn { padding: 10px 20px; background: linear-gradient(45deg, #4ecdc4, #44a08d);
                        border: none; border-radius: 15px; color: white; cursor: pointer;
                        font-size: 14px; margin-top: 10px; display: inline-block; width: 100%;
                        text-align: center; transition: transform 0.3s; }
        .download-btn:hover { transform: scale(1.05); }
        .download-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">🔐 Crypto Tool with All Simulations</h1>
        
        <div class="input-section">
            <div style="display: flex; gap: 10px; margin-bottom: 20px; align-items: center;">
                <label style="margin: 0;">
                    <input type="radio" name="inputMode" value="text" checked onchange="toggleInputMode()"> Text Input
                </label>
                <label style="margin: 0;">
                    <input type="radio" name="inputMode" value="file" onchange="toggleInputMode()"> File Upload
                </label>
            </div>
            
            <div class="input-group" id="textInputGroup">
                <label for="plaintext">Text Input:</label>
                <textarea id="plaintext" rows="4" placeholder="Enter message...">The quick brown fox jumps over the lazy dog</textarea>
            </div>
            
            <div class="input-group" id="fileInputGroup" style="display: none;">
                <label for="fileInput">Choose File:</label>
                <input type="file" id="fileInput" onchange="handleFileSelect()" 
                       style="width: 100%; padding: 15px; border: 2px dashed rgba(255,255,255,0.3); 
                              border-radius: 10px; background: rgba(255,255,255,0.05); color: white; cursor: pointer;">
                <div id="fileInfo" style="margin-top: 10px; padding: 10px; background: rgba(0,0,0,0.2); 
                                          border-radius: 5px; display: none;">
                    <div><strong>File:</strong> <span id="fileName"></span></div>
                    <div><strong>Size:</strong> <span id="fileSize"></span></div>
                    <div><strong>Type:</strong> <span id="fileType"></span></div>
                </div>
            </div>
            
            <div style="text-align: center;">
                <button class="btn" onclick="runAESWithSimulation()">🔬 AES & Simulate</button>
                <button class="btn" onclick="runRSAWithSimulation()">🗝️ RSA & Simulate</button>
                <button class="btn" onclick="runECDHWithSimulation()">🤝 ECDH & Simulate</button>
                <button class="btn" onclick="runHashWithSimulation()">🔢 Hash & Simulate</button>
            </div>
        </div>
        
        <div class="simulation-panel" id="simulationPanel">
            <h2 class="simulation-title" id="simulationTitle">🔬 Simulation</h2>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div id="simulationSteps"></div>
            <div class="simulation-controls">
                <button class="btn" onclick="closeSimulation()">Close Simulation</button>
            </div>
        </div>
        
        <div class="crypto-ops">
            <div class="crypto-card">
                <h3>🔒 AES-GCM</h3>
                <div class="result" id="aes-result">Click AES to encrypt</div>
                <button class="download-btn" id="aes-download" onclick="downloadResult('aes')" disabled>📥 Download AES Result</button>
            </div>
            
            <div class="crypto-card">
                <h3>🗝️ RSA OAEP</h3>
                <div class="result" id="rsa-result">Click RSA to encrypt</div>
                <button class="download-btn" id="rsa-download" onclick="downloadResult('rsa')" disabled>📥 Download RSA Result</button>
            </div>
            
            <div class="crypto-card">
                <h3>🤝 ECDH</h3>
                <div class="result" id="ecdh-result">Click ECDH for key exchange</div>
                <button class="download-btn" id="ecdh-download" onclick="downloadResult('ecdh')" disabled>📥 Download ECDH Result</button>
            </div>
            
            <div class="crypto-card">
                <h3>🔢 SHA-256</h3>
                <div class="result" id="hash-result">Click Hash to generate</div>
                <button class="download-btn" id="hash-download" onclick="downloadResult('hash')" disabled>📥 Download Hash Result</button>
            </div>
        </div>
    </div>

    <script>
        let selectedFile = null;
        let results = {
            aes: null,
            rsa: null,
            ecdh: null,
            hash: null
        };

        function toggleInputMode() {
            const mode = document.querySelector('input[name="inputMode"]:checked').value;
            document.getElementById('textInputGroup').style.display = mode === 'text' ? 'block' : 'none';
            document.getElementById('fileInputGroup').style.display = mode === 'file' ? 'block' : 'none';
            if (mode === 'text') selectedFile = null;
        }

        function handleFileSelect() {
            const file = document.getElementById('fileInput').files[0];
            if (file) {
                selectedFile = file;
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('fileSize').textContent = formatFileSize(file.size);
                document.getElementById('fileType').textContent = file.type || 'unknown';
                document.getElementById('fileInfo').style.display = 'block';
            } else {
                selectedFile = null;
                document.getElementById('fileInfo').style.display = 'none';
            }
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' bytes';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
        }

        async function callAPI(endpoint, data) {
            try {
                const response = await fetch(`/api/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (error) {
                return { success: false, error: error.message };
            }
        }

        async function getInputData() {
            const mode = document.querySelector('input[name="inputMode"]:checked').value;
            
            if (mode === 'file') {
                if (!selectedFile) throw new Error('Please select a file');
                
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const arrayBuffer = e.target.result;
                        const bytes = new Uint8Array(arrayBuffer);
                        const base64 = btoa(String.fromCharCode.apply(null, bytes));
                        resolve({
                            data: base64,
                            name: selectedFile.name,
                            size: selectedFile.size,
                            type: 'file',
                            mimeType: selectedFile.type
                        });
                    };
                    reader.onerror = () => reject(new Error('Failed to read file'));
                    reader.readAsArrayBuffer(selectedFile);
                });
            } else {
                const text = document.getElementById('plaintext').value;
                if (!text.trim()) throw new Error('Please enter some text');
                return {
                    data: text,
                    name: 'text_input.txt',
                    size: new Blob([text]).size,
                    type: 'text'
                };
            }
        }

        async function runAESWithSimulation() {
            try {
                const inputData = await getInputData();
                const simResult = await callAPI('aes-simulate', inputData);
                
                if (simResult.success) {
                    displaySimulation('🔬 AES-GCM Encryption Simulation', simResult.simulation);
                    const encResult = await callAPI('aes', inputData);
                    
                    if (encResult.success) {
                        results.aes = encResult;
                        document.getElementById('aes-result').innerHTML = 
                            `✓ Encrypted<br>File: ${encResult.originalName}<br>Size: ${encResult.originalSize} → ${encResult.encryptedSize} bytes<br>` +
                            `IV: ${encResult.iv.substring(0, 24)}...<br>Time: ${encResult.encryptTime}ms<br>` +
                            `Tag: ${encResult.tag.substring(0, 24)}...<br>` +
                            `<details><summary>Encrypted Data</summary><div style="max-height:100px;overflow-y:auto;font-size:10px;word-break:break-all;">${encResult.encrypted}</div></details>`;
                        document.getElementById('aes-download').disabled = false;
                    }
                } else {
                    alert('Error: ' + simResult.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function runRSAWithSimulation() {
            try {
                const inputData = await getInputData();
                const simResult = await callAPI('rsa-simulate', inputData);
                
                if (simResult.success) {
                    displaySimulation('🗝️ RSA-OAEP Encryption Simulation', simResult.simulation);
                    const encResult = await callAPI('rsa', inputData);
                    
                    if (encResult.success) {
                        results.rsa = encResult;
                        document.getElementById('rsa-result').innerHTML = 
                            `✓ Encrypted<br>File: ${encResult.originalName}<br>Size: ${encResult.originalSize} → ${encResult.encryptedSize} bytes<br>` +
                            `Keygen: ${encResult.keygenTime}ms<br>` +
                            `<details><summary>Encrypted Data</summary><div style="max-height:100px;overflow-y:auto;font-size:10px;word-break:break-all;">${encResult.encrypted}</div></details>`;
                        document.getElementById('rsa-download').disabled = false;
                    }
                } else {
                    alert('Error: ' + simResult.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function runECDHWithSimulation() {
            try {
                const simResult = await callAPI('ecdh-simulate', {});
                
                if (simResult.success) {
                    displaySimulation('🤝 ECDH Key Exchange Simulation', simResult.simulation);
                    const result = await callAPI('ecdh', {});
                    
                    if (result.success) {
                        results.ecdh = result;
                        document.getElementById('ecdh-result').innerHTML = 
                            `✓ Key Exchange<br>Agreement: ${result.keyAgreement}<br>` +
                            `Key Length: ${result.sharedKeyLength} bytes<br>` +
                            `<details><summary>Shared Key</summary><div style="max-height:100px;overflow-y:auto;font-size:10px;word-break:break-all;">${result.sharedKey}</div></details>`;
                        document.getElementById('ecdh-download').disabled = false;
                    }
                } else {
                    alert('Error: ' + simResult.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function runHashWithSimulation() {
            try {
                const inputData = await getInputData();
                const simResult = await callAPI('hash-simulate', inputData);
                
                if (simResult.success) {
                    displaySimulation('🔢 SHA-256 Hashing Simulation', simResult.simulation);
                    const result = await callAPI('hash', inputData);
                    
                    if (result.success) {
                        results.hash = result;
                        document.getElementById('hash-result').innerHTML = 
                            `✓ Hash Generated<br>File: ${result.originalName}<br>Size: ${result.originalSize} bytes<br>` +
                            `Time: ${result.hashTime}ms<br>` +
                            `<details><summary>SHA-256 Hash</summary><div style="max-height:100px;overflow-y:auto;font-size:10px;word-break:break-all;">${result.hash}</div></details>`;
                        document.getElementById('hash-download').disabled = false;
                    }
                } else {
                    alert('Error: ' + simResult.error);
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        function displaySimulation(title, simulation) {
            document.getElementById('simulationTitle').textContent = title;
            const panel = document.getElementById('simulationPanel');
            const stepsContainer = document.getElementById('simulationSteps');
            const progressFill = document.getElementById('progressFill');
            
            stepsContainer.innerHTML = '';
            
            simulation.steps.forEach((step, index) => {
                const stepDiv = document.createElement('div');
                stepDiv.className = 'sim-step';
                stepDiv.style.opacity = '0';
                stepDiv.style.transform = 'translateY(20px)';
                
                let dataHTML = '';
                for (const [key, value] of Object.entries(step.data)) {
                    const label = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                    dataHTML += `
                        <div class="sim-data-item">
                            <span class="sim-data-label">${label}:</span>
                            <span class="sim-data-value">${value}</span>
                        </div>
                    `;
                }
                
                stepDiv.innerHTML = `
                    <div class="sim-step-header">
                        <div class="sim-step-number">${step.step}</div>
                        <div class="sim-step-name">${step.name}</div>
                    </div>
                    <div class="sim-step-desc">${step.description}</div>
                    <div class="sim-data">${dataHTML}</div>
                `;
                
                stepsContainer.appendChild(stepDiv);
                
                setTimeout(() => {
                    stepDiv.style.transition = 'all 0.5s ease';
                    stepDiv.style.opacity = '1';
                    stepDiv.style.transform = 'translateY(0)';
                    
                    const progress = ((index + 1) / simulation.steps.length) * 100;
                    progressFill.style.width = progress + '%';
                }, index * 200);
            });
            
            panel.classList.add('active');
            panel.scrollIntoView({ behavior: 'smooth' });
        }

        function closeSimulation() {
            document.getElementById('simulationPanel').classList.remove('active');
        }

        function downloadResult(technique) {
            const result = results[technique];
            if (!result) {
                alert('No result to download');
                return;
            }

            let content = '';
            const timestamp = new Date().toLocaleString();

            if (technique === 'aes') {
                content = `AES-GCM Encryption Result
========================
Generated: ${timestamp}
Original File: ${result.originalName}
Original Size: ${result.originalSize} bytes
Encrypted Size: ${result.encryptedSize} bytes
Encryption Time: ${result.encryptTime}ms

IV (Initialization Vector):
${result.iv}

Authentication Tag:
${result.tag}

Encrypted Data:
${result.encrypted}
`;
            } else if (technique === 'rsa') {
                content = `RSA-OAEP Encryption Result
==========================
Generated: ${timestamp}
Original File: ${result.originalName}
Original Size: ${result.originalSize} bytes
Encrypted Size: ${result.encryptedSize} bytes
Key Generation Time: ${result.keygenTime}ms

Encrypted Data:
${result.encrypted}
`;
            } else if (technique === 'ecdh') {
                content = `ECDH Key Exchange Result
=========================
Generated: ${timestamp}
Key Agreement: ${result.keyAgreement}
Shared Key Length: ${result.sharedKeyLength} bytes

Shared Key:
${result.sharedKey}
`;
            } else if (technique === 'hash') {
                content = `SHA-256 Hash Result
====================
Generated: ${timestamp}
Original File: ${result.originalName}
Original Size: ${result.originalSize} bytes
Hash Time: ${result.hashTime}ms

SHA-256 Hash:
${result.hash}
`;
            }

            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(content));
            element.setAttribute('download', `${technique}_result_${Date.now()}.txt`);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }
    </script>
</body>
</html>
